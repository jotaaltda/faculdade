<html>

<head>
    <title> Formulários! </title>
</head>

<body>
    <form name="Cadastro" method="post" action="script.js" autocomplete="on">

        <fieldset style="background-color: aquamarine">
            <legend> Dados Pessoais: </legend>

            <table>
                <tr>
                    <td align="right"> <label id="Nome" for="Nome"> Usuário: </label> </td>
                    <td> <input type="text" name="Nome"> </td>
                </tr>

                <tr>
                    <td align="right"> <label id="Senha" for="Senha"> Senha: </label> </td>
                    <td> <input type="password" name="Senha" maxlength="8"> </td>
                </tr>

                <tr>
                    <td align="right"> <label id="Idade" for="Idade"> Idade: </label> </td>
                    <td> <input type="number" name="Idade" maxlength="8" min="18" max="65"> </td>
                </tr>

                <tr>
                    <td align="right"> <label id="Intervalo" for="Intervalo"> Tempo em meses para contrato: </label>
                    </td>
                    <td> <input type="number" name="Intervalo" min="6" max="36" step="6"> </td>
                </tr>

            </table>
        </fieldset>

        <fieldset style="background-color: aquamarine">
            <legend> Inputs de conteúdos abertos! </legend>

            <table>
                <tr>
                    <td align="right"> <label id="email" for="email"> E-mail: </label> </td>
                    <td> <input type="email" name="email" size="100"> </td>
                </tr>

                <tr>
                    <td align="right"> <label id="url" for="email"> Site: </label> </td>
                    <td> <input type="url" name="url" size="100"> </td>
                </tr>

                <td align="center"> <label id="resumo" for="resumo"> Escreva sobre você: </label> </td>
                <td> <textarea name="resumo" cols="100" rows="10"> </textarea> </td>

            </table>
        </fieldset>

        <fieldset style="background-color: aquamarine">
            <legend> Inputs de conteúdos restritos! </legend>

            <table>
                <tr>
                    <td align="right"> <label id="ComboBox" for="cidades"> Cidade: </label> </td>
                    <td>
                        <select name="cidades">
                            <option value=""> Selecione </option>
                            <option value="Div"> Divinópolis </option>
                            <option value="BH"> Belo Horizonte </option>
                            <option value="CC"> Carmo do Cajuru </option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td align="right"> <label id="ComboBox" for="cidades2"> Cidade: </label> </td>
                    <td>
                        <select name="cidades2" multiple>
                            <option value=""> Selecione </option>
                            <option value="Div"> Divinópolis </option>
                            <option value="BH"> Belo Horizonte </option>
                            <option value="CC"> Carmo do Cajuru </option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td align="right"> <label id="Calcado" for="Calcado"> Calçado favorito: </label> </td>
                    <td>
                        <input type="radio" name="Calcado" value="S"> Sapato
                        <input type="radio" name="Calcado" value="C"> Chinelo
                        <input type="radio" name="Calcado" value="T"> Tênis
                    </td>
                </tr>

                <tr>
                    <td align="right"> <label id="midia" for="midia"> Como nos conheceu? </label> </td>
                    <td>
                        <input type="checkbox" name="midia" value="T"> Televisão <br>
                        <input type="checkbox" name="midia" value="I"> Internet <br>
                        <input type="checkbox" name="midia" value="R"> Midias Sociais
                    </td>
                </tr>

                <tr>
                    <td align="right"> <label id="rangeidade" name="rangeidade"> Idade: </label> </td>
                    <td> <input type="range" name="rangeidade" min="18" max="65"> </td>
                </tr>

            </table>
        </fieldset> <br>

        <fieldset style="background-color: aquamarine">
            <legend>Datas e horas!</legend>
            <table>

                <tr>
                    <td align="right"> <label id="data" for="data"> Nascimento: </label> </td>
                    <td> <input type="date" name="data" max="2008-04-01" min="1980-04-01"> </td>
                </tr>

                <tr>
                    <td align="right"> <label id="horario" for="horario"> Horário: </label> </td>
                    <td> <input type="time" name="horario" max="22:59:59" min="08:00:00"> </td>
                </tr>

                <tr>
                    <td align="right"> <label id="dataehora" for="dataehora"> Data e hora: </label> </td>
                    <td> <input type="datetime-local" name="dataehora"> </td>
                </tr>

            </table>
        </fieldset> <br>

        <fieldset style="background-color: aquamarine">
            <legend> Miscelânia! </legend>

            <table>

                <tr>
                    <td align="right"> <label id="cor" for="cor"> Cor: </label> </td>
                    <td> <input type="color" name="cor"> </td>
                </tr>

                <tr>
                    <td align="right"> <label id="arquivo" for="arquivo"> Arquivo: </label> </td>
                    <td> <input type="file" name="arquivo"> </td>
                </tr>

                <tr>
                    <td align="right"> <label id="botaoimagem" for="botaoimagem"> Clique aqui: </label> </td>
                    <td> <input type="image" src="../Assets/Images/figura3.jpg" alt="enviar" width="300" height="50">
                    </td>
                </tr>

                <tr>
                    <td align="right"> <label id="botao" for="botao"> Clique aqui também: </label> </td>
                    <td> <button type="submit"> <img src="../Assets/Images/figura2.jpg" alt="enviar" width="285"
                                height="50"> </button> </td>
                </tr>

                <tr>
                    <td align="right"> <label id="browsers" for="browsers"> Navegador: </label> </td>
                    <td>
                        <input list="browsers">
                        <datalist id="browsers">
                            <option value="Firefox">
                            <option value="Chrome">
                            <option value="Opera GX">
                            <option value="Brave">
                            <option value="Edge">
                        </datalist>
                    </td>
                </tr>

            </table>
        </fieldset>

        <center>
            <input type="submit" name="Cadastrar" value="Cadastrar">
            <input type="reset" name="Limpar" value="Limpar"> <br>
        </center>

    </form>
</body>

</html>
