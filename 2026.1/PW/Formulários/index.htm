<html>

<head>
    <title> Formulários! </title>
</head>

<body>

    <form name="Cadastro" method="post" action="script.js" autocomplete="on">

        <fieldset style="background-color: aquamarine">
            <legend> Dados Pessoais: </legend>
            <label id="Nome" for="Nome"> Usuário: </label>
            <input type="text" name="Nome"> <br><br>

            <label id="Senha" for="Senha"> Senha: </label>
            <input type="password" name="Senha" maxlength="8"> <br><br>

            <label id="Idade" for="Idade"> Idade: </label>
            <input type="number" name="Idade" maxlength="8" min="18" max="65"> <br><br>

            <label id="Intervalo" for="Intervalo"> Tempo em meses para contrato: </label>
            <input type="number" name="Intervalo" min="6" max="36" step="6">

        </fieldset>

        <input type="submit" name="Cadastrar" value="Cadastrar">

        <input type="reset" name="Limpar" value="Limpar">

    </form>
    </table>

</body>

</html>
